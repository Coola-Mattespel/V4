    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -40%;
      z-index: -1;
      filter: blur(120px);
      opacity: .55;
      animation: auroraMove 40s ease-in-out infinite;
      pointer-events: none;

    body::before {

        radial-gradient(circle at 70% 40%, var(--accent-dark), transparent 65%),
        radial-gradient(circle at 50% 70%, var(--accent), transparent 60%);

    body::after {
      background:
        radial-gradient(circle at 60% 30%, var(--accent-dark), transparent 60%),
        radial-gradient(circle at 20% 60%, var(--accent), transparent 65%);
      animation-duration: 60s;
      opacity: .4;

    @keyframes auroraMove {

      50% { transform: translate(10%, -8%) rotate(180deg); }

    .menu-toggle {

function getDisplayUsername() {
  if (!currentUser) return "Gäst";
  return `${currentUser.username}${currentUser.verified ? " ✔️" : ""}`;
}

function isChatBlocked() {
  const now = Date.now();
  if (!currentUser) return "Du måste vara inloggad för att chatta.";
  if (currentUser.banned) return "Du är bannad från chatten.";
  if (currentUser.timeoutUntil && currentUser.timeoutUntil > now) {
    return `Du har timeout i ${Math.ceil((currentUser.timeoutUntil - now) / 1000)} sek.`;
  }
  if (chatCooldownUntil > now) return `Cooldown: ${((chatCooldownUntil - now) / 1000).toFixed(1)}s`;
  return "";
}

function refreshChatStatus() {
  const msg = isChatBlocked();
  chatStatusEl.textContent = msg || `Inloggad som ${getDisplayUsername()}`;
}

function sendChatMessage() {
  const text = sanitizeText(chatInputEl.value);
  if (!text || !chatRef) return;
  const blockedMsg = isChatBlocked();
  if (blockedMsg) {
    alert(blockedMsg);
    return;
  }
  if (containsBannedWord(text)) {
    alert("Ditt meddelande innehåller ord som inte är tillåtna.");
    return;
  }

  chatRef.push({ uid: currentUser.id, name: getDisplayUsername(), text, ts: Date.now() });
  chatCooldownUntil = Date.now() + 3000;
  chatInputEl.value = "";
  refreshChatStatus();
  setTimeout(refreshChatStatus, 3100);
}

      const order = ["#", ...alphabet];

      order.forEach((groupKey) => {

        if (!groupItems.length) return;

        groupItems.sort((a, b) =>
          displayName(a).localeCompare(displayName(b), "sv", {

          })
        );

    async function registerAccount() {
      if (!db) return;
      const email = (document.getElementById("authEmail").value || "").trim().toLowerCase();
      const username = sanitizeName(document.getElementById("authUsername").value);
      const password = (document.getElementById("authPassword").value || "").trim();
      if (!email || !username || !password) return alert("Fyll i mail, username och lösenord.");
      if (containsBannedWord(username) || USER_BANNED_WORDS.some((w) => username.toLowerCase().includes(w))) return alert("Username innehåller förbjudet ord.");
      const existing = await db.ref("accounts").orderByChild("usernameLower").equalTo(username.toLowerCase()).once("value");
      if (existing.exists()) return alert("Det username är upptaget.");
      const emailExists = await db.ref("accounts").orderByChild("email").equalTo(email).once("value");
      if (emailExists.exists()) return alert("Mail används redan.");
      const ref = db.ref("accounts").push();
      const quests = {};
      questsConfig.forEach((q) => { quests[q.id] = { progressMs: 0, claimed: false }; });
      await ref.set({ email, username, usernameLower: username.toLowerCase(), password, coins: 0, verified: false, banned: false, timeoutUntil: 0, sessionActive: false, createdAt: Date.now(), quests, inventory: {} });
      alert("Konto skapat! Logga in nu.");
    }

    async function loginAccount() {
      if (!db) return;
      const email = (document.getElementById("authEmail").value || "").trim().toLowerCase();
      const password = (document.getElementById("authPassword").value || "").trim();
      const snap = await db.ref("accounts").orderByChild("email").equalTo(email).once("value");
      if (!snap.exists()) return alert("Kontot hittades inte.");
      let found = null;
      snap.forEach((c) => { if (!found) found = { id: c.key, ...c.val() }; });
      if (!found || found.password !== password) return alert("Fel lösenord.");
      if (found.banned) return alert("Detta konto är bannat.");
      if (found.sessionActive) return alert("Kontot är redan inloggat på en annan enhet.");
      const sessionId = `sess_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
      await db.ref(`accounts/${found.id}`).update({ sessionActive: true, sessionId, lastSeen: Date.now(), forcedLogout: false });
      currentUser = { ...found, sessionId };
      userRef = db.ref(`accounts/${found.id}`);
      userRef.onDisconnect().update({ sessionActive: false, lastSeen: Date.now() });
      watchCurrentUser();
      renderProfile();
      refreshChatStatus();
      setChatTab(activeChatTab);
      alert("Inloggad!");
    }

    function startGameTracker() {
      if (gameTrackerInterval) clearInterval(gameTrackerInterval);
      gameTrackerInterval = setInterval(async () => {
        if (!currentUser || !activeGame || !activeGameStartedAt || !db) return;
        const now = Date.now();
        const delta = Math.min(now - activeGameStartedAt, 5000);
        activeGameStartedAt = now;
        const matching = questsConfig.filter((q) => q.game === activeGame);
        if (!matching.length) return;
        for (const q of matching) {
          const current = currentUser.quests?.[q.id] || { progressMs: 0, claimed: false };
          const next = Math.min(current.progressMs + delta, q.targetMs);
          await db.ref(`accounts/${currentUser.id}/quests/${q.id}`).update({ progressMs: next, claimed: !!current.claimed });
        }
      }, 5000);
    }

    function startIntroLoader() {
      const intro = document.getElementById("introOverlay");
      if (!intro || !introLoaderFill || !introLoaderMessage) return;
      const duration = Math.floor(Math.random() * 3000) + 3000; // 3-6s
      const slowDownStart = Math.floor(duration * 0.82);
      introLoaderFill.style.transform = "scaleX(0)";
      introLoaderMessage.textContent = loadingMessages[Math.floor(Math.random() * loadingMessages.length)];
      let startTs = null;

      const animate = (ts) => {
        if (startTs === null) startTs = ts;
        const elapsed = ts - startTs;
        let progress = 0;
        if (elapsed < slowDownStart) {
          const t = elapsed / slowDownStart;
          progress = 95 * (1 - Math.pow(1 - t, 3));
        } else if (elapsed < duration) {
          const t = (elapsed - slowDownStart) / (duration - slowDownStart);
          progress = 95 + 5 * (1 - Math.pow(1 - t, 2));
        } else {
          introLoaderFill.style.transform = "scaleX(1)";
          setTimeout(() => {
            intro.classList.add("fade-out");
            setTimeout(() => intro.remove(), 560);
          }, 180);
          return;
        }
        introLoaderFill.style.transform = `scaleX(${Math.min(progress, 100) / 100})`;
        requestAnimationFrame(animate);
      };

      requestAnimationFrame(animate);
    }

        if (!tabId) {
          tabId = `tab_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
          sessionStorage.setItem(tabKey, tabId);
        }

        const myPresenceRef = presenceRef.child(tabId);

        db.ref(".info/connected").on("value", (snap) => {
          if (snap.val() === true) {
            myPresenceRef.onDisconnect().remove();
            myPresenceRef.set({
              online: true,
              ts: firebase.database.ServerValue.TIMESTAMP
            });
          }
        });

        presenceRef.on("value", (snap) => {
          activePlayersEl.textContent = `Aktiva spelare: ${snap.numChildren()}`;
        }, () => {
          activePlayersEl.textContent = "Aktiva spelare: --";
        });
      chatRef = db.ref("global-chat");
        chatRef.limitToLast(120).on("child_added", (snap) => { addChatMessage(snap.val() || {}); });
        startGameTracker();
      } catch (err) {
        activePlayersEl.textContent = "Aktiva spelare: --";
        addSystemChatMessage("Kunde inte ansluta chatten.");
      }

    })();
  </script>
</body>
</html>
